services:
  mongodb:
    image: mongo:8
    container_name: caccelerator-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - caccelerator_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  caccelerator_mongo_data:
